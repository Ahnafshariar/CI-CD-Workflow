name: CI/CD Pipeline

# Run on every push to main, and allow manual runs from the Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — TEST  (runs on a GitHub-hosted runner)
  # Runs the app's tests, saves the output to a file, uploads it.
  # ─────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests and capture results to a file
        run: |
          set -o pipefail
          npm run check 2>&1 | tee test-results.txt

      - name: Upload test results as an artifact
        if: always()            # upload even if a test failed, so the result is always recorded
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — DEPLOY  (runs on YOUR self-hosted runner)
  # Waits for test, pulls the artifact, prints it, then deploys.
  # ─────────────────────────────────────────────────────────────
  deploy:
    needs: test                 # dependency: deploy only runs if test succeeds
    runs-on: self-hosted  # the 'ostad' label targets your runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download the test-results artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: Display the artifact content
        run: |
          echo "===== Test results from the test job ====="
          cat test-results.txt

      - name: Deploy the application (PM2)
        run: |
          cd /home/ahnaf/DevOps/Module-03/Module-3-deployment
          npm install
          pm2 delete node-app || true
          pm2 start "./src/server.js" --name node-app
          pm2 save
          npm start
